<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Favicon from Logo</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f0f0f0; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        canvas { border: 1px solid #ddd; border-radius: 4px; background: white; margin: 1rem 0; width: 128px; height: 128px; }
        button { background: #f17f20; color: white; border: none; padding: 10px 20px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; }
        button:hover { background: #d97018; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input[type="file"] { margin: 1rem 0; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Favicon Generator</h2>
        <p>Your browser blocked the image from loading due to local file security. <br><b>Please select your "Logo Main.png" below</b> and it will work instantly!</p>
        
        <input type="file" id="logoInput" accept="image/png, image/jpeg">
        
        <div id="previewArea" style="display:none; margin-top: 1rem;">
            <strong>Original Logo:</strong><br>
            <img id="sourceImage" style="max-width: 300px; border: 1px solid #ddd; margin-top: 10px;">
            
            <div style="margin-top: 2rem;">
                <strong>Generated Favicon (Preview):</strong><br>
                <canvas id="outputCanvas" width="512" height="512"></canvas>
            </div>
            
            <br>
            <button id="downloadBtn">Download Favicon</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('logoInput');
        const img = document.getElementById('sourceImage');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                img.src = event.target.result;
                previewArea.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        img.addEventListener('load', () => {
            const w = img.naturalWidth;
            const h = img.naturalHeight;
            
            if(w === 0 || h === 0) return;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            let minX = w, minY = h, maxX = 0, maxY = 0;
            let foundAny = false;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];
                    const a = data[i+3];

                    if (a > 50) { 
                        if (r > 150 && g > 50 && g < 200 && b < 100) {
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                            foundAny = true;
                        }
                    }
                }
            }

            if (!foundAny) {
                minX = w; minY = h; maxX = 0; maxY = 0;
                for (let y = 0; y < h / 2; y++) {
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x) * 4;
                        if (data[i+3] > 50 && (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240)) {
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                            foundAny = true;
                        }
                    }
                }
            }

            if (!foundAny) {
                minX = 0; minY = 0; maxX = w; maxY = h;
            }

            const cropW = maxX - minX;
            const cropH = maxY - minY;
            const size = Math.max(cropW, cropH) * 1.3; 
            
            const outCanvas = document.getElementById('outputCanvas');
            const outCtx = outCanvas.getContext('2d');
            
            outCtx.fillStyle = '#ffffff';
            outCtx.fillRect(0, 0, 512, 512);

            const scale = 512 / size;
            const scaledCropW = cropW * scale;
            const scaledCropH = cropH * scale;
            
            const drawX = (512 - scaledCropW) / 2;
            const drawY = (512 - scaledCropH) / 2;

            outCtx.drawImage(
                img,
                minX, minY, cropW, cropH,
                drawX, drawY, scaledCropW, scaledCropH
            );

            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = 'favicon.png';
                link.href = outCanvas.toDataURL('image/png');
                link.click();
            };
        });
    </script>
</body>
</html>
